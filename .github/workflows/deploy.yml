name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Test API build
        working-directory: ./cocow-api
        run: |
          npm ci
          npm run build

      - name: Test Web build
        working-directory: ./cocow-web
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: Cocow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "❌ Error: SSH_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USERNAME }}" ]; then
            echo "❌ Error: SSH_USERNAME secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "❌ Error: SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "✅ All required secrets are configured"
          echo "Deploying to: ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              -p "$SSH_PORT" \
              "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" bash -s << 'ENDSSH'
            set -e
            cd ~/cocow-home-page
            if [ ! -d ".git" ]; then
              echo "❌ Error: ~/cocow-home-page is not a git repository"
              exit 1
            fi
            git pull origin main || git pull origin master
          ENDSSH

      - name: Build and start services
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              -p "$SSH_PORT" \
              "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" bash -s << 'ENDSSH'
            set -e
            cd ~/cocow-home-page

            if [ ! -f ".env" ]; then
              echo "❌ Error: .env file not found in ~/cocow-home-page"
              echo "Please create ~/cocow-home-page/.env with required production variables."
              exit 1
            fi

            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            # 创建外部网络（如果不存在）
            docker network inspect cocow-network >/dev/null 2>&1 || docker network create cocow-network
            docker network inspect sso-network    >/dev/null 2>&1 || docker network create sso-network

            # 停止旧容器
            $COMPOSE_CMD down

            # 在服务器上构建镜像
            $COMPOSE_CMD build --no-cache

            # 启动服务
            $COMPOSE_CMD up -d

            # 等待服务启动（postgres healthcheck 需要时间）
            echo "Waiting for services to start..."
            sleep 30

            # 检查服务状态
            $COMPOSE_CMD ps

            # 清理悬空镜像
            docker image prune -f
          ENDSSH

      - name: Health check
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              -p "$SSH_PORT" \
              "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" bash -s << 'ENDSSH'
            cd ~/cocow-home-page

            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            # Docker Compose v1 shows "Up", v2 shows "running"
            if ! $COMPOSE_CMD ps | grep -qiE "up|running"; then
              echo "❌ Error: Containers are not running"
              $COMPOSE_CMD logs --tail=50
              exit 1
            fi

            echo "✅ Deployment successful!"
          ENDSSH

      - name: Cleanup on failure
        if: failure()
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              -p "$SSH_PORT" \
              "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" bash -s << 'ENDSSH'
            cd ~/cocow-home-page

            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            echo "⚠️  Deployment failed, cleaning up..."
            $COMPOSE_CMD logs --tail=100
            $COMPOSE_CMD down
          ENDSSH
